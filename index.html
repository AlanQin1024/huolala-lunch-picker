<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>午餐选择器</title>
  <style>
    :root {
      --primary: #f06a54;
      --primary-deep: #d95a45;
      --secondary: #1d8f8f;
      --bg-a: #f4e7d9;
      --bg-b: #fef7ef;
      --ink: #2b2b2b;
      --ink-soft: #616161;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(45% 30% at 10% 10%, rgba(255, 255, 255, 0.8), transparent),
        radial-gradient(50% 35% at 90% 0%, rgba(255, 214, 170, 0.5), transparent),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display: flex;
      justify-content: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
        max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .app {
      width: min(1180px, 100%);
      min-height: 92vh;
      max-height: 95vh;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(1rem, 2vw, 2rem);
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 900px) and (min-height: 680px) {
      .app {
        aspect-ratio: 16 / 9;
        min-height: 0;
        height: min(92vh, calc((100vw - 24px) * 9 / 16));
      }
    }

    .clock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 1rem;
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .countdown {
      color: var(--primary);
    }

    h1 {
      text-align: center;
      font-size: clamp(1.8rem, 3.6vw, 2.5rem);
      color: var(--primary);
      letter-spacing: 0.02em;
      margin-top: 0.2rem;
    }

    .subtitle {
      text-align: center;
      color: var(--ink-soft);
      margin: 0.4rem 0 1.2rem;
    }

    .toolbar {
      display: flex;
      gap: 0.65rem;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      background: rgba(240, 240, 240, 0.8);
      border-radius: 999px;
      padding: 0.45rem;
      flex-wrap: wrap;
    }

    .group {
      display: flex;
      gap: 0.5rem;
    }

    .toggle-btn {
      border: none;
      background: transparent;
      color: var(--ink-soft);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
    }

    .toggle-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 0.55rem 1rem;
      background: #fff;
      color: var(--secondary);
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .toggle-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .playground {
      position: relative;
      flex: 1;
      min-height: 290px;
      display: grid;
      place-items: center;
      margin-bottom: 1.2rem;
    }

    .wheel-wrap {
      position: relative;
      width: min(40vh, 48vw, 420px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.16);
      background: #fff;
      transition: transform 4.2s cubic-bezier(0.18, 0.9, 0.26, 1.02);
    }

    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 34px solid var(--primary);
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.2));
      z-index: 3;
    }

    .spin-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
    }

    .primary-btn {
      border: none;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      padding: 0.8rem 2.2rem;
      font-size: 1.06rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 20px rgba(240, 106, 84, 0.28);
      border: none;
    }

    .primary-btn:hover {
      background: var(--primary-deep);
      transform: translateY(-2px);
    }

    .primary-btn:active {
      transform: translateY(0);
    }

    .draw-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      padding: 0;
      font-size: 2rem;
      border: 4px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 12px 24px rgba(240, 106, 84, 0.4);
    }

    .cards-wrap {
      display: none;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8rem, 2vw, 1.3rem);
      width: 100%;
      flex-wrap: wrap;
    }

    .card-scene {
      width: clamp(92px, 18vw, 120px);
      aspect-ratio: 11 / 16;
      perspective: 900px;
      cursor: pointer;
    }

    .lot-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.17, 0.84, 0.44, 1);
    }

    .lot-card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 0.6rem;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      word-break: break-all;
    }

    .front {
      color: #fff;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #fa7f72, #f9a056);
    }

    .front::after {
      content: "?";
      font-family: Arial, sans-serif;
    }

    .back {
      transform: rotateY(180deg);
      color: var(--ink);
      background: #fff;
      border: 3px solid rgba(240, 106, 84, 0.5);
    }

    .lot-card.winner .back {
      border-color: #f4af14;
      background: #fff8e0;
      color: #cc4b22;
    }

    .card-tip {
      width: 100%;
      text-align: center;
      margin-top: 0.3rem;
      color: var(--ink-soft);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .manager {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding-top: 1rem;
      margin-top: auto;
    }

    .manager h3 {
      margin-bottom: 0.8rem;
      font-size: 1.05rem;
      color: var(--ink);
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
    }

    .input-row input {
      flex: 1;
      border: 2px solid transparent;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      padding: 0.75rem 0.85rem;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-row input:focus {
      border-color: var(--secondary);
    }

    .add-btn {
      border: none;
      border-radius: 12px;
      padding: 0 1rem;
      background: var(--secondary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 999px;
      padding: 0.38rem 0.76rem;
      font-size: 0.92rem;
      animation: rise-in 0.2s ease;
    }

    .delete-tag {
      border: none;
      background: transparent;
      color: #e45b45;
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 99;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .dialog {
      background: #fff;
      border-radius: 20px;
      width: min(92vw, 440px);
      text-align: center;
      padding: 2rem 1.2rem;
      transform: scale(0.86) translateY(18px);
      transition: transform 0.3s ease;
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.3);
    }

    .overlay.show .dialog {
      transform: scale(1) translateY(0);
    }

    .result-title {
      color: var(--ink-soft);
      font-size: 1rem;
    }

    .result-dish {
      margin: 0.65rem 0;
      color: var(--primary);
      font-size: clamp(1.8rem, 6vw, 2.7rem);
      font-weight: 900;
      text-shadow: 2px 2px 0 #ffe8d2;
    }

    .result-type {
      color: var(--ink-soft);
      font-weight: 800;
      margin-bottom: 1.2rem;
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .app {
        width: 100%;
        max-height: none;
        min-height: calc(100svh - 24px);
      }

      .wheel-wrap {
        width: min(74vw, 360px);
      }
    }

    @media (max-width: 560px) {
      .toolbar {
        border-radius: 18px;
      }

      .group {
        width: 100%;
        justify-content: center;
      }

      .clock-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .playground {
        min-height: 350px;
      }

      .draw-btn {
        width: 78px;
        height: 78px;
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="clock-row">
      <span id="clock">🕒 时间加载中...</span>
      <span id="countdown" class="countdown">⏳ 计算中...</span>
    </section>

    <h1>午餐选择器</h1>
    <p class="subtitle">纠结午饭吃什么？交给命运安排。</p>

    <section class="toolbar">
      <div class="group" id="mode-group">
        <button class="toggle-btn active" data-mode="wheel">🎡 命运转盘</button>
        <button class="toggle-btn" data-mode="cards">🥢 翻牌抽签</button>
      </div>
      <div class="group">
        <a
          class="toggle-link"
          href="https://h5.waimai.meituan.com/waimai/mindex/home"
          target="_blank"
          rel="noopener noreferrer"
          >🛵 外卖</a
        >
      </div>
    </section>

    <section class="playground">
      <div id="wheel-view" class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
        <div class="spin-area">
          <button id="spin-btn" class="primary-btn draw-btn">抽</button>
        </div>
      </div>

      <div id="cards-view" class="cards-wrap">
        <div class="card-scene" data-card-index="0">
          <div class="lot-card" id="card-0">
            <div class="face front"></div>
            <div class="face back"></div>
          </div>
        </div>
        <div class="card-scene" data-card-index="1">
          <div class="lot-card" id="card-1">
            <div class="face front"></div>
            <div class="face back"></div>
          </div>
        </div>
        <div class="card-scene" data-card-index="2">
          <div class="lot-card" id="card-2">
            <div class="face front"></div>
            <div class="face back"></div>
          </div>
        </div>
        <p id="card-tip" class="card-tip">请凭直觉翻开一张牌</p>
      </div>
    </section>

    <section class="manager">
      <h3>候选菜单</h3>
      <div class="input-row">
        <input id="dish-input" type="text" placeholder="输入菜品名称并回车" />
        <button id="add-btn" class="add-btn">添加</button>
      </div>
      <div id="tags" class="tags"></div>
    </section>
  </main>

  <section id="result-overlay" class="overlay" role="dialog" aria-modal="true" aria-label="抽取结果">
    <div class="dialog">
      <p class="result-title">命中注定的午餐是</p>
      <p id="result-dish" class="result-dish">牛肉饭</p>
      <p id="result-type" class="result-type">祝你吃得开心</p>
      <button id="close-result" class="primary-btn">太好了，就吃这个</button>
    </div>
  </section>

  <script>
    const DEFAULT_OPTIONS = [
      "牛饭饭",
      "百姓小炒",
      "粿条",
      "白切",
      "尔海麦",
      "碗湘乐",
      "华记烧腊",
      "粿条",
      "荣耀食堂",
      "工会食堂"
    ];

    const wheelPalette = [
      "#ffd3b6",
      "#ffaaa5",
      "#ff8b94",
      "#dcedc1",
      "#a8e6cf",
      "#95e1d3",
      "#c7ceea",
      "#f6dfeb",
      "#fff4b2",
      "#f5c7a9"
    ];

    let options = [...DEFAULT_OPTIONS];
    let mode = "wheel";
    let spinning = false;
    let currentRotation = 0;
    let cardChoices = [];

    const wheelCanvas = document.getElementById("wheel");
    const wheelCtx = wheelCanvas.getContext("2d");

    const els = {
      clock: document.getElementById("clock"),
      countdown: document.getElementById("countdown"),
      modeButtons: document.querySelectorAll("#mode-group .toggle-btn"),
      wheelView: document.getElementById("wheel-view"),
      cardsView: document.getElementById("cards-view"),
      spinBtn: document.getElementById("spin-btn"),
      cardTip: document.getElementById("card-tip"),
      cardScenes: document.querySelectorAll(".card-scene"),
      dishInput: document.getElementById("dish-input"),
      addBtn: document.getElementById("add-btn"),
      tags: document.getElementById("tags"),
      overlay: document.getElementById("result-overlay"),
      resultDish: document.getElementById("result-dish"),
      resultType: document.getElementById("result-type"),
      closeResult: document.getElementById("close-result")
    };

    init();

    function init() {
      renderTags();
      drawWheel();
      bindEvents();
      updateClock();
      setInterval(updateClock, 1000);
      resetCards();
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("zh-CN", { hour12: false });
      els.clock.textContent = `🕒 ${time}`;

      const offWork = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 18, 0, 0);
      const diff = offWork - now;

      if (diff > 0) {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        els.countdown.textContent = `距离下班：${h}时 ${m}分 ${s}秒`;
        els.countdown.style.color = "var(--primary)";
      } else {
        els.countdown.textContent = "今天已经下班，吃点好的";
        els.countdown.style.color = "#d49100";
      }
    }

    function bindEvents() {
      els.modeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          if (spinning) return;
          setActive(els.modeButtons, btn);
          mode = btn.dataset.mode;
          els.wheelView.style.display = mode === "wheel" ? "grid" : "none";
          els.cardsView.style.display = mode === "cards" ? "flex" : "none";
          if (mode === "cards") resetCards();
        });
      });

      els.spinBtn.addEventListener("click", spinWheel);

      els.cardScenes.forEach((scene) => {
        scene.addEventListener("click", () => {
          const index = Number(scene.dataset.cardIndex);
          pickCard(index);
        });
      });

      els.addBtn.addEventListener("click", addOption);
      els.dishInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") addOption();
      });

      els.closeResult.addEventListener("click", closeResult);
      els.overlay.addEventListener("click", (event) => {
        if (event.target === els.overlay) closeResult();
      });
    }

    function setActive(buttons, activeButton) {
      buttons.forEach((btn) => btn.classList.remove("active"));
      activeButton.classList.add("active");
    }

    function renderTags() {
      els.tags.innerHTML = "";
      options.forEach((item, index) => {
        const tag = document.createElement("div");
        tag.className = "tag";

        const text = document.createElement("span");
        text.textContent = item;

        const del = document.createElement("button");
        del.className = "delete-tag";
        del.type = "button";
        del.textContent = "×";
        del.title = "删除";
        del.addEventListener("click", () => removeOption(index));

        tag.appendChild(text);
        tag.appendChild(del);
        els.tags.appendChild(tag);
      });

      drawWheel();
      if (mode === "cards") {
        resetCards();
      }
    }

    function addOption() {
      if (spinning) return;
      const value = els.dishInput.value.trim();
      if (!value) return;
      if (options.includes(value)) {
        alert("这个选项已经存在了");
        return;
      }

      options.push(value);
      els.dishInput.value = "";
      renderTags();
    }

    function removeOption(index) {
      if (spinning) return;
      if (options.length <= 2) {
        alert("至少保留两个选项，才有得选");
        return;
      }
      options.splice(index, 1);
      renderTags();
    }

    function drawWheel() {
      const center = 300;
      const radius = 300;
      wheelCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);

      if (options.length === 0) {
        wheelCtx.fillStyle = "#ececec";
        wheelCtx.beginPath();
        wheelCtx.arc(center, center, radius, 0, Math.PI * 2);
        wheelCtx.fill();

        wheelCtx.fillStyle = "#7d7d7d";
        wheelCtx.font = "bold 30px sans-serif";
        wheelCtx.textAlign = "center";
        wheelCtx.textBaseline = "middle";
        wheelCtx.fillText("请添加选项", center, center);
        return;
      }

      const arc = (Math.PI * 2) / options.length;
      for (let i = 0; i < options.length; i += 1) {
        const angle = i * arc;

        wheelCtx.beginPath();
        wheelCtx.moveTo(center, center);
        wheelCtx.fillStyle = wheelPalette[i % wheelPalette.length];
        wheelCtx.arc(center, center, radius, angle, angle + arc);
        wheelCtx.fill();

        wheelCtx.strokeStyle = "rgba(255,255,255,0.75)";
        wheelCtx.lineWidth = 4;
        wheelCtx.stroke();

        wheelCtx.save();
        wheelCtx.translate(center, center);
        wheelCtx.rotate(angle + arc / 2);
        wheelCtx.textAlign = "right";
        wheelCtx.textBaseline = "middle";
        wheelCtx.fillStyle = "#2f2f2f";
        wheelCtx.font = "bold 31px 'Microsoft YaHei', sans-serif";

        const label = options[i].length > 8 ? `${options[i].slice(0, 7)}...` : options[i];
        wheelCtx.fillText(label, radius - 38, 0);
        wheelCtx.restore();
      }
    }

    function spinWheel() {
      if (spinning || options.length === 0) return;
      spinning = true;

      els.spinBtn.style.opacity = "0.6";
      els.spinBtn.textContent = "...";

      const randomIndex = Math.floor(Math.random() * options.length);
      const arc = 360 / options.length;
      const spinRounds = 6;

      const targetAngle = 270 - (randomIndex * arc + arc / 2);
      currentRotation += spinRounds * 360 + targetAngle - (currentRotation % 360);
      wheelCanvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        els.spinBtn.style.opacity = "1";
        els.spinBtn.textContent = "抽";

        setTimeout(() => {
          showResult(options[randomIndex]);
          spinning = false;
        }, 900);
      }, 4200);
    }

    function resetCards() {
      cardChoices = pickThreeChoices(options);

      for (let i = 0; i < 3; i += 1) {
        const card = document.getElementById(`card-${i}`);
        card.classList.remove("flipped", "winner");
        const back = card.querySelector(".back");
        back.textContent = cardChoices[i] || "再来一局";
      }

      els.cardTip.textContent = "请凭直觉翻开一张牌";
    }

    function pickThreeChoices(list) {
      if (list.length === 0) return ["", "", ""];
      const shuffled = [...list].sort(() => Math.random() - 0.5);
      const picked = shuffled.slice(0, 3);
      while (picked.length < 3) {
        picked.push(list[Math.floor(Math.random() * list.length)]);
      }
      return picked;
    }

    function pickCard(index) {
      if (spinning || options.length === 0) return;
      if (!cardChoices.length) resetCards();

      spinning = true;
      els.cardTip.textContent = "命运正在揭晓...";

      const selectedCard = document.getElementById(`card-${index}`);
      selectedCard.classList.add("flipped", "winner");

      setTimeout(() => {
        for (let i = 0; i < 3; i += 1) {
          if (i === index) continue;
          document.getElementById(`card-${i}`).classList.add("flipped");
        }

        setTimeout(() => {
          const result = cardChoices[index] || options[Math.floor(Math.random() * options.length)];
          showResult(result);
          spinning = false;
        }, 1000);
      }, 900);
    }

    function showResult(dish) {
      els.resultDish.textContent = dish;
      els.resultType.textContent = "祝你吃得开心";
      els.overlay.classList.add("show");
    }

    function closeResult() {
      els.overlay.classList.remove("show");
      if (mode === "cards") {
        setTimeout(resetCards, 220);
      }
    }
  </script>
</body>
</html>
